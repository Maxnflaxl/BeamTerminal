# Production compose for BeamTerminal.
# Deploy path: /root/Beam/BeamTerminal
#
# explorer-node runs on the host (systemd unit) on 127.0.0.1:8888.
# nginx runs on the host (not in compose), see ../nginx.conf.
#
# Both indexer and api use host network mode so they can reach
# - explorer-node on 127.0.0.1:8888
# - postgres on 127.0.0.1:5432 (postgres publishes to loopback only)

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: beamterminal
      POSTGRES_USER: beamterminal
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    secrets: [postgres_password]
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beamterminal -d beamterminal"]
      interval: 5s
      timeout: 3s
      retries: 20

  indexer:
    build: ./backend
    command: node dist/src/indexer.js
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host
    env_file: ./backend/.env

  api:
    build: ./backend
    command: node dist/src/api.js
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: host
    env_file: ./backend/.env

  # BEAM wallet-api 7.5.13882. Used by:
  #   - the asset-swaps subsystem (assets_swap_offers_list)
  #   - the DApp Store projection (invoke_contract of dapps_store_app.wasm)
  # Connects P2P to the host-local explorer-node on 127.0.0.1:10000.
  # First boot generates wallet.db + seed.txt in the named volume; the wallet
  # holds no funds, it is read-only gossip + RPC. Required env in
  # backend/.env: WALLET_API_NODE_ADDR, WALLET_API_PASS, WALLET_API_PORT,
  # WALLET_API_HTTP, WALLET_API_IP_WHITELIST.
  wallet-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.wallet-api
    restart: always
    network_mode: host
    env_file: ./backend/.env
    volumes:
      - wallet-api-data:/data

  # Kubo IPFS daemon joined to BEAM's private mainnet swarm. Backs the public
  # gateway at gateway.beamterminal.0xmx.net/ipfs/<cid>. The swarm.key +
  # bootstrap addresses are public (taken from beam-ui open source) and live
  # in backend/ipfs/.
  #
  # Not host-network like the others — Kubo's gateway needs predictable port
  # bindings so nginx on the host can proxy to 127.0.0.1:8080.
  ipfs:
    image: ipfs/kubo:v0.30.0
    restart: always
    environment:
      LIBP2P_FORCE_PNET: "1"
      IPFS_PROFILE: "server"
    volumes:
      - ipfs-data:/data/ipfs
      - ./backend/ipfs/swarm.key:/data/ipfs/swarm.key:ro
      - ./backend/ipfs/init.sh:/container-init.d/01-beam-private-swarm.sh:ro
    ports:
      # Host port 8080 is held by mailcow; the gateway lives on 8085 instead.
      # nginx (gateway.beamterminal.0xmx.net server block) proxies to this.
      - "127.0.0.1:8085:8080"   # gateway
      - "127.0.0.1:5011:5001"   # admin API (loopback-only)
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  wallet-api-data:
  ipfs-data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
