# BeamTerminal — served behind Cloudflare (Cloudflare terminates TLS).
# Deploy path on the VPS: /root/Beam/BeamTerminal
#
# Install:
#   sudo ln -sf /root/Beam/BeamTerminal/nginx.conf /etc/nginx/sites-enabled/beamterminal
#   sudo nginx -t && sudo systemctl reload nginx

# Restore the real client IP from Cloudflare's CF-Connecting-IP header.
# Ranges: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
  listen 80;
  listen [::]:80;
  server_name beamterminal.0xmx.net;

  root /var/www/beamterminal;
  index index.html;

  # Static SPA bundle
  location / {
    try_files $uri $uri/ /index.html;
  }

  # UI-facing API
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # CoinGecko-spec endpoints
  location /cg/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # OpenGraph preview cards (/og/site.svg, /og/pair/:id.svg). Served straight
  # out of Fastify; consumed by social-media crawlers via the SPA's <meta
  # property="og:image"> tags. Long edge cache — they update at most once per
  # deploy.
  location /og/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # Pair chart PNGs for chat-bot integrations. Tight regex so the SPA route
  # `/pair/:id` keeps working — only `/pair/<id>/chart.png` is proxied to the
  # API; everything else under /pair/ falls through to try_files and serves
  # the React app.
  location ~ ^/pair/[^/]+/chart\.png$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # Public IPFS gateway — proxies any `/ipfs/<cid>` request to the Fastify
  # route that pulls bytes from BEAM's private mainnet swarm via wallet-api.
  # Same shape as ipfs.io / dweb.link so third-party tools can swap hosts.
  # Longer timeout than /api because a cold-cache CID fetch can take a while.
  location /ipfs/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 120s;
    proxy_buffering off;
  }

  # Gzip for the static bundle (Cloudflare also compresses, but this saves a hop)
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}

