# BeamTerminal — served behind Cloudflare (Cloudflare terminates TLS).
# Deploy path on the VPS: /root/Beam/BeamTerminal
#
# Install:
#   sudo ln -sf /root/Beam/BeamTerminal/nginx.conf /etc/nginx/sites-enabled/beamterminal
#   sudo nginx -t && sudo systemctl reload nginx

# Restore the real client IP from Cloudflare's CF-Connecting-IP header.
# Ranges: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
  listen 80;
  listen [::]:80;
  server_name beamterminal.0xmx.net;

  root /var/www/beamterminal;
  index index.html;

  # Static SPA bundle
  location / {
    try_files $uri $uri/ /index.html;
  }

  # UI-facing API
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # CoinGecko-spec endpoints
  location /cg/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 60s;
  }

  # Gzip for the static bundle (Cloudflare also compresses, but this saves a hop)
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}

# Public IPFS gateway, backed by the Kubo daemon in `docker-compose.yml` that's
# joined to BEAM's private mainnet swarm. Replaces the dead
# `gallery20.apps.beam.mw`. Serves any CID the swarm can find; only the
# `/ipfs/<cid>` path is in scope (use Kubo's `?download=true&filename=…` query
# string for an attachment disposition).
server {
  listen 80;
  listen [::]:80;
  server_name gateway.beamterminal.0xmx.net;

  client_max_body_size 100M;
  proxy_buffering off;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;

  location /ipfs/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    # CIDs are immutable, so a year-long browser cache is safe. The `always`
    # qualifier keeps the header consistent on Kubo error paths too.
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
  }

  # Don't be a generic web — only /ipfs/<cid> is in scope.
  location / { return 404; }
}
