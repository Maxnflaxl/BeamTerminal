services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: beamterminal-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: beamterminal
      POSTGRES_USER: beamterminal
      POSTGRES_PASSWORD: beamterminal
    ports:
      # Bound to 5433 on the host to avoid conflicting with a system Postgres
      # on the default port. Update DATABASE_URL in .env to match.
      - "127.0.0.1:5433:5432"
    volumes:
      - beamterminal-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beamterminal -d beamterminal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # BEAM wallet-api 7.5.13882. Only needed for the asset-swaps indexer subsystem
  # (assets_swap_offers_list — not exposed by the explorer). Opt-in: comment
  # out if you don't care about asset-swap data locally.
  #
  # First boot generates a fresh wallet.db + seed.txt in the named volume; the
  # wallet holds no funds, it's a read-only gossip subscriber.
  wallet-api:
    build:
      context: .
      dockerfile: Dockerfile.wallet-api
    container_name: beamterminal-wallet-api-dev
    restart: unless-stopped
    environment:
      # Public mainnet node P2P endpoint (same host we point EXPLORER_URL at).
      WALLET_API_NODE_ADDR: explorer.0xmx.net:10000
      # Wallet-db password. Any non-empty string; this wallet never holds funds.
      WALLET_API_PASS: beamterminal-dev
      WALLET_API_PORT: 10005
      WALLET_API_HTTP: 1
      # Listening interface inside the container; the port binding below
      # already restricts external reach to 127.0.0.1.
      WALLET_API_IP_WHITELIST: 0.0.0.0/0
    ports:
      - "127.0.0.1:10005:10005"
    volumes:
      - beamterminal-wallet-api-dev:/data

  # Private-swarm IPFS daemon (Kubo). Joins BEAM's mainnet swarm via the
  # bootstrap peers + swarm key in `backend/ipfs/`. In production it backs
  # the public gateway at `gateway.beamterminal.0xmx.net/ipfs/<cid>` that
  # the frontend's Download button targets. Locally bound to 127.0.0.1
  # only — wallet/site don't talk to the dev daemon.
  ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: beamterminal-ipfs-dev
    restart: unless-stopped
    environment:
      LIBP2P_FORCE_PNET: "1"   # refuse to start if swarm.key is missing
      IPFS_PROFILE: "server"   # disables some auto-discovery; saner default for VPS
    volumes:
      - beamterminal-ipfs-dev:/data/ipfs
      - ./ipfs/swarm.key:/data/ipfs/swarm.key:ro
      - ./ipfs/init.sh:/container-init.d/01-beam-private-swarm.sh:ro
    ports:
      - "127.0.0.1:8080:8080"  # gateway
      - "127.0.0.1:5001:5001"  # api (admin surface; kept loopback)
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  beamterminal-postgres-dev:
  beamterminal-wallet-api-dev:
  beamterminal-ipfs-dev:
